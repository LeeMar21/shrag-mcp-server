services:
  - type: web
    name: shrag-mcp-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python custom_tools.py
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false
